name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: write
  pull-requests: write
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/nxlog-demo
  PR: ${{ github.event_name == 'pull_request' && !startsWith(github.head_ref, 'gitops/') }}

jobs:

  test:
    name: Unit tests & dependency audit
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'gitops/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python3 -m unittest discover -s app -v
      - run: pip install pip-audit && pip-audit -r app/requirements.txt

  build:
    name: Build image
    runs-on: ubuntu-latest
    needs: test
    if: always() && github.event_name == 'pull_request' && needs.test.result == 'success'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: app/
          push: false
          tags: ${{ env.IMAGE }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/image.tar
      - uses: actions/upload-artifact@v4
        with:
          name: image
          path: /tmp/image.tar
          retention-days: 1

  smoke:
    name: Smoke test
    runs-on: ubuntu-latest
    needs: build
    if: always() && github.event_name == 'pull_request' && needs.build.result == 'success'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: image
          path: /tmp
      - run: docker load -i /tmp/image.tar
      - name: Run
        run: |
          docker run -d --name app -p 8080:8080 \
            -e PROD=false -e SMOKE_TEST_VAR=hello \
            ${{ env.IMAGE }}:ci
          for i in $(seq 1 10); do
            curl -sf http://localhost:8080/healthz && break || sleep 2
          done
          [ "$(curl -sf http://localhost:8080/healthz)" = "ok" ]
          curl -sf http://localhost:8080/ | python3 -c "
          import json, sys; d = json.load(sys.stdin)
          assert d['SMOKE_TEST_VAR'] == 'hello' and d['PROD'] == 'false'
          "
          [ "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/nope)" = "404" ]
          docker rm -f app

  scan:
    name: Vulnerability scan
    runs-on: ubuntu-latest
    needs: build
    if: always() && github.event_name == 'pull_request' && needs.build.result == 'success'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: image
          path: /tmp
      - run: docker load -i /tmp/image.tar
      - run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
          grype ${{ env.IMAGE }}:ci --fail-on critical --config .grype.yaml

  publish:
    name: Publish
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && !startsWith(github.event.head_commit.message, 'chore(gitops):')
    outputs:
      short-sha: ${{ steps.sha.outputs.value }}
    steps:
      - uses: actions/checkout@v4
      - id: sha
        run: echo "value=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: app/
          push: true
          tags: |
            ${{ env.IMAGE }}:sha-${{ steps.sha.outputs.value }}
            ${{ env.IMAGE }}:latest
            ${{ startsWith(github.ref, 'refs/tags/') && format('{0}:{1}', env.IMAGE, github.ref_name) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  gitops:
    name: GitOps update
    runs-on: ubuntu-latest
    needs: publish
    if: startsWith(github.ref, 'refs/heads/')
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: |
          ./scripts/render.sh \
            --set hub=ghcr.io \
            --set image=${{ github.repository_owner }}/nxlog-demo \
            --set tag=sha-${{ needs.publish.outputs.short-sha }}
      - name: Open GitOps PR
        id: pr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: gitops/update-sha-${{ needs.publish.outputs.short-sha }}
          base: main
          commit-message: "chore(gitops): bump image to sha-${{ needs.publish.outputs.short-sha }}"
          title: "chore(gitops): bump image to sha-${{ needs.publish.outputs.short-sha }}"
          body: |
            **Image:** `${{ env.IMAGE }}:sha-${{ needs.publish.outputs.short-sha }}`
            **Commit:** ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
          labels: gitops,automated
      - name: Auto-merge GitOps PR
        if: steps.pr.outputs.pull-request-number != ''
        run: gh pr merge --auto --squash ${{ steps.pr.outputs.pull-request-number }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
